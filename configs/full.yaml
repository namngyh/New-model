project:
  seed: 55
  pipeline_mode: experimental
  seeds: [11, 22, 33, 44, 55, 66, 77, 88, 99, 111]
  data_path: data/raw/VNINDEX_Daily.csv
  output_root: .
data:
  train_fraction: 0.60
  validation_fraction: 0.20
  horizons: [1, 5, 10, 20, 40, 60]
  embargo: 60
features:
  correlation_threshold: 0.995
hmm:
  candidate_states: [2, 3, 4, 5]
  seeds: [11, 22, 33, 44, 55]
  n_iter: 250
egarch:
  enabled: true
random_forest:
  n_estimators: 800
  max_depth: 7
  min_samples_leaf: 20
  max_features: sqrt
  max_samples: 0.8
point_forecast:
  mode: validation_gated_blend
  alpha_grid: [0.0, 0.05, 0.10, 0.15, 0.20, 0.25, 0.30, 0.35, 0.40, 0.45, 0.50, 0.55, 0.60, 0.65, 0.70, 0.75, 0.80, 0.85, 0.90, 0.95, 1.0]
  primary_metric: rmse
  minimum_relative_improvement: 0.01
  use_one_standard_error_rule: true
conformal:
  enabled: true
  alpha_levels: [0.50, 0.20, 0.10, 0.05]
  candidate_windows: [250, 500, null]
  stratification:
    volatility_bins: 4
    use_regime: true
  minimum_stratum_size: 80
  finite_sample_correction: true
  horizon_label_delay: true
simulation:
  paths: 20000
  horizon: 20
  block_length: 15
  student_weight: 0.35
  sample_paths: 200
  stratified:
    enabled: true
    allocation: neyman
    pilot_paths: 4000
    minimum_paths_per_regime: 1000
  importance_sampling:
    enabled: true
    paths: 50000
    proposal_strengths: [0.10, 0.20, 0.30, 0.40]
    shock_strength_ratio: 0.50
    minimum_ess_ratio: 0.20
  adaptive_stopping:
    enabled: true
    batch_size: 2000
    minimum_paths: 10000
    maximum_paths: 100000
    probability_mcse_tolerance: 0.0025
    rare_probability_relative_mcse: 0.10
    quantile_stability_tolerance: 0.001
    consecutive_stable_batches: 3
  variance_reduction_experiments:
    antithetic_enabled: false
    control_variate_enabled: false
validation:
  folds: 8
  bootstrap_reps: 2000
jackknife:
  mode: full
outer_bootstrap:
  enabled: true
  mode: full
  replications_quick: 2000
  replications_full: 100
  mean_block_length: 20
  parallel_jobs: -1
tail_head:
  enabled: true
  n_estimators: 600
  minimum_precision: 0.25
drawdown:
  enabled: true
  anchor_modes: [origin_peak, historical_peak]
  include_rolling_peak: true
  rolling_peak_window: 252
  thresholds: [0.03, 0.05, 0.07, 0.10, 0.15]
  backtest_paths: 5000
  latest_paths: 100000
  adaptive_stopping:
    batch_size: 2000
    minimum_paths: 10000
    maximum_paths: 100000
    probability_absolute_mcse: 0.0025
    rare_event_relative_mcse: 0.10
    mdar_quantile_change_tolerance: 0.002
    ced_relative_change_tolerance: 0.02
    stable_batches: 3
